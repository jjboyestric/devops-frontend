name: Deploy Frontend to EC2

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker del Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-innovatech:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-innovatech:latest

      - name: Desplegar Frontend en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop frontend-app || true
            sudo docker rm frontend-app || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-innovatech:latest
            sudo docker run -d --name frontend-app -p 80:80 --restart always ${{ secrets.DOCKER_USERNAME }}/frontend-innovatech:latest
            sudo docker image prune -f